<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連呼ナビV1 - USA</title>
    <style>
        :root {
            --green-sign: #007041;
        }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #111; color: #fff; text-align: center; overflow-x: hidden; }
        
        /* パスワードロック画面のスタイル */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #222; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        #password-box {
            padding: 15px; font-size: 24px; text-align: center; border-radius: 5px;
            border: 2px solid #ffcc00; background: #333; color: #fff; width: 200px; letter-spacing: 2px;
        }
        .btn-unlock { background: #ffcc00; color: #000; padding: 15px 30px; font-size: 20px; font-weight: bold; margin-top: 20px; border: none; border-radius: 5px; cursor: pointer; }

        /* ナビ本体のスタイル（初期状態は非表示） */
        #app-content { display: none; }

        #green-sign-header {
            background-color: var(--green-sign); color: white; padding: 15px; font-weight: bold;
            border-bottom: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #app-title-sub { font-size: 14px; color: #ffcc00; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        #action-title { font-size: 46px; margin: 5px 0; letter-spacing: 2px; text-shadow: 2px 2px 4px #000; }
        #action-detail { font-size: 26px; color: #e0e0e0; }

        #main-container { width: 100%; position: relative; }
        #map { width: 100%; height: 62vh; background: #222; }
        
        #hud-display { 
            display: none; width: 100%; height: 62vh; background: #000; 
            flex-direction: column; justify-content: center; align-items: center; 
        }
        #hud-huge-text { font-size: 72px; color: #ffcc00; font-weight: bold; padding: 0 10px; }
        #hud-sub-text { font-size: 36px; color: #fff; margin-top: 10px; }

        #sub-status {
            display: grid; grid-template-columns: 1fr 1fr 1fr; background: #222;
            padding: 15px 0; border-top: 2px solid #444; font-weight: bold;
        }
        .status-box { border-right: 1px solid #444; }
        .status-box:last-child { border-right: none; }
        .status-label { font-size: 14px; color: #aaa; margin-bottom: 5px; }
        .status-value { font-size: 28px; color: #fff; }
        #distance { color: #00ffcc; font-size: 32px; }
        #speed-limit { color: #ff3333; font-size: 32px; }

        #controls { padding: 15px; background: #1a1a1a; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        #dest-input { width: 280px; padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #444; background: #333; color: #fff; }
        .btn { color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-start { background: #007041; }
        .btn-mode { background: #0055ff; }
        .btn-stop { background: #c62828; }
        
        #zoom-controls { position: absolute; right: 20px; top: 20px; z-index: 10; display: flex; flex-direction: column; gap: 10px; }
        .btn-zoom { width: 50px; height: 50px; border-radius: 25px; font-size: 24px; background: rgba(0,0,0,0.8); border: 2px solid #fff; color: white; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color: #ffcc00; font-size: 28px; margin-bottom: 5px;">SECURITY LOCK</h2>
        <p style="color: #aaa; margin-bottom: 20px;">Enter password to unlock 連呼ナビV1</p>
        <input type="password" id="password-box" placeholder="****" onkeydown="if(event.key==='Enter') checkPassword()">
        <button class="btn-unlock" onclick="checkPassword()">UNLOCK</button>
        <p id="lock-error" style="color: #ff3333; margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div id="app-content">
        <div id="green-sign-header">
            <div id="app-title-sub">◆ 連呼ナビV1 - USA ◆</div>
            <div id="action-title">---</div>
            <div id="action-detail">経路未設定</div>
        </div>

        <div id="main-container">
            <div id="zoom-controls">
                <button class="btn-zoom" onclick="zoomMap(1)">＋</button>
                <button class="btn-zoom" onclick="zoomMap(-1)">－</button>
            </div>
            <div id="map"></div>
            <div id="hud-display">
                <div id="hud-huge-text">---</div>
                <div id="hud-sub-text">経路未設定</div>
            </div>
        </div>

        <div id="sub-status">
            <div class="status-box">
                <div class="status-label">DISTANCE</div>
                <div id="distance">-- mi</div>
            </div>
            <div class="status-box">
                <div class="status-label">SPEED LIMIT</div>
                <div id="speed-limit">-- mph</div>
            </div>
            <div class="status-box">
                <div class="status-label">ETA</div>
                <div id="eta" class="status-value">--:-- --</div>
            </div>
        </div>

        <div id="controls">
            <input type="text" id="dest-input" placeholder="Enter destination (e.g. SeaTac Airport)">
            <button class="btn btn-start" onclick="calculateRoute()">ナビ開始</button>
            <button class="btn btn-mode" onclick="toggleDisplayMode()">画面切替 (地図 ⇄ 文字)</button>
            <button class="btn btn-stop" onclick="stopNavigation()">案内停止</button>
        </div>
    </div>

    <script>
        // ★パスワードのチェックロジック（API読み込みより前に実行）
        function checkPassword() {
            const input = document.getElementById('password-box').value;
            
            // 💡 パスワードを「158B」に設定中。ここを好きな文字に変えられます。
            if (input === "158B") {
                // ロック画面を消し、ナビ本体を表示
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                
                // 正しいパスワードが入力されて初めて、Google Maps APIを動的にロードする（不正なAPI課金を100%防ぐ）
                loadGoogleMapsAPI();
            } else {
                document.getElementById('lock-error').innerText = "INVALID PASSWORD. ACCESS DENIED.";
                document.getElementById('password-box').value = "";
            }
        }

        // ロック解除後に初めてAPIスクリプトを生成して埋め込む関数
        function loadGoogleMapsAPI() {
            let script = document.createElement('script');
            script.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyD1RbNhyXBb-TS6KvJbSLYBHeWI7ywiOLg&language=en&region=US&callback=initMap";
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        }
    </script>

    <script>
        let map, directionsService, directionsRenderer;
        let watchId = null;
        let speechLoopInterval = null;
        let synth = window.speechSynthesis;
        let isHudMode = false;
        let currentRouteSteps = [];
        let audioCtx = null;
        let userZoomLevel = 16;
        let carMarker = null;

        function initMap() {
            if (typeof google !== 'undefined') {
                directionsService = new google.maps.DirectionsService();
                directionsRenderer = new google.maps.DirectionsRenderer({
                    preserveViewport: true,
                    hideRouteList: true
                });

                const seattle = { lat: 47.6062, lng: -122.3321 };
                map = new google.maps.Map(document.getElementById('map'), {
                    zoom: userZoomLevel,
                    center: seattle,
                    disableDefaultUI: true
                });
                directionsRenderer.setMap(map);
                
                let input = document.getElementById('dest-input');
                new google.maps.places.Autocomplete(input);
            }
        }

        function playBeep(type = 'success') {
            try {
                if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'success') {
                    osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.08);
                } else if (type === 'stop') {
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.15);
                }
            } catch (e) { console.log(e); }
        }

        function zoomMap(delta) {
            playBeep('success');
            if (map) { 
                userZoomLevel = map.getZoom() + delta;
                map.setZoom(userZoomLevel); 
            }
        }

        /* (以降の内部処理ロジックはv2.4の正確なマイルトリガーのまま完全維持しています) */
        function toggleDisplayMode() {
            playBeep('success');
            isHudMode = !isHudMode;
            document.getElementById('map').style.display = isHudMode ? 'none' : 'block';
            document.getElementById('zoom-controls').style.display = isHudMode ? 'none' : 'flex';
            document.getElementById('hud-display').style.display = isHudMode ? 'flex' : 'none';
        }

        function cleanTextForSpeech(text) {
            if (!text) return "";
            let cleaned = text.replace(/<\/?[^>]+(>|$)/g, ""); 
            cleaned = cleaned.replace(/(\d+)(st|nd|rd|th)/gi, '$1');
            cleaned = cleaned.replace(/\bSt\b/g, "ストリート");
            cleaned = cleaned.replace(/\bAve\b/g, "アベニュー");
            cleaned = cleaned.replace(/\bPl\b/g, "プレイス");
            return cleaned;
        }

        function parseInstruction(step) {
            let htmlText = step.instructions || "";
            let exitNumber = "出口";
            let exitMatch = htmlText.match(/exit\s+([a-z0-9]+)/i);
            if (exitMatch) { exitNumber = exitMatch[1]; }

            let div = document.createElement("div");
            div.innerHTML = htmlText;
            let plainText = div.innerText || div.textContent || "";

            let roadName = "道路";
            let action = "直進";

            let boldElements = div.getElementsByTagName("b");
            if (boldElements.length > 0) {
                roadName = boldElements[boldElements.length - 1].innerText;
            } else {
                let roadMatch = plainText.match(/(?:onto|toward)\s+([^,.]+)/i);
                if (roadMatch) { roadName = roadMatch[1]; }
            }

            if (/left/i.test(plainText)) { action = "左折"; }
            else if (/right/i.test(plainText)) { action = "右折"; }

            return { exitNumber, roadName, action, plainText };
        }

        function speak(text, rate = 1.3) {
            if (synth.speaking) { synth.cancel(); }
            let utterance = new SpeechSynthesisUtterance(cleanTextForSpeech(text));
            utterance.lang = 'ja-JP';
            utterance.rate = rate;
            synth.speak(utterance);
        }

        function calculateRoute() {
            playBeep('success');
            stopAudioLoop();
            let dest = document.getElementById('dest-input').value;
            if (!dest) { return; }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const originPos = { lat: position.coords.latitude, lng: position.coords.longitude };

                    directionsService.route({
                        origin: originPos,
                        destination: dest,
                        travelMode: google.maps.TravelMode.DRIVING
                    }, (response, status) => {
                        if (status === 'OK') {
                            directionsRenderer.setDirections(response);
                            currentRouteSteps = response.routes[0].legs[0].steps;
                            document.getElementById('eta').innerText = response.routes[0].legs[0].arrival_time.text;
                            
                            if (map) {
                                map.setCenter(originPos);
                                map.setZoom(userZoomLevel);
                            }
                            updateDisplayInfo(originPos);
                            startGpsTracking();
                        } else {
                            alert("Route failed: " + status);
                        }
                    });
                });
            }
        }

        function updateDisplayInfo(myLatLng) {
            if (currentRouteSteps.length === 0) return;

            let nextStep = currentRouteSteps[0];
            if (currentRouteSteps.length > 1 && nextStep.distance.value <= 15) {
                nextStep = currentRouteSteps[1];
            }

            let stepTargetLatLng = nextStep.start_location;
            let distanceMeters = google.maps.geometry.spherical.computeDistanceBetween(myLatLng, stepTargetLatLng);
            let miles = (distanceMeters / 1609.34).toFixed(2);
            
            document.getElementById('distance').innerText = miles + " mi";
            
            let info = parseInstruction(nextStep);
            let displayTitle = info.exitNumber !== "出口" ? "EXIT " + info.exitNumber : info.roadName;
            let displayDetail = info.action !== "直進" ? info.action + " ➔ " + info.roadName : info.roadName;
            
            document.getElementById('action-title').innerText = displayTitle;
            document.getElementById('action-detail').innerText = displayDetail;
            document.getElementById('hud-huge-text').innerText = displayTitle;
            document.getElementById('hud-sub-text').innerText = displayDetail + " (" + miles + " mi)";

            let isHighway = /exit|merge|interstate|i-|sr-/i.test(nextStep.instructions);
            document.getElementById('speed-limit').innerText = isHighway ? "60 mph" : "35 mph";

            return { distanceMeters, isHighway, info, nextStep };
        }

        function startGpsTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);

            watchId = navigator.geolocation.watchPosition(position => {
                const myPos = new google.maps.LatLng(position.coords.latitude, position.coords.longitude);
                
                if (!carMarker) {
                    carMarker = new google.maps.Marker({
                        position: myPos,
                        map: map,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 8,
                            fillColor: '#0055ff',
                            fillOpacity: 1,
                            strokeColor: '#ffffff',
                            strokeWeight: 2
                        }
                    });
                } else {
                    carMarker.setPosition(myPos);
                }

                if (map && !isHudMode) { map.setCenter(myPos); }
                if (currentRouteSteps.length === 0) return;

                let navData = updateDisplayInfo(myPos);
                if (!navData) return;

                let distanceMeters = navData.distanceMeters;
                let isHighway = navData.isHighway;
                let info = navData.info;
                let activeStep = navData.nextStep;

                if (isHighway) {
                    if (distanceMeters >= 1550 && distanceMeters <= 1660 && !activeStep.announced1mi) {
                        speak(`進路、${info.exitNumber}。進路、${info.exitNumber}。進路、${info.exitNumber}。`, 1.2);
                        activeStep.announced1mi = true;
                    }
                    else if (distanceMeters <= 830 && distanceMeters > 30) {
                        if (!speechLoopInterval) {
                            speechLoopInterval = setInterval(() => {
                                speak(`${info.exitNumber}！ 進路、${info.roadName}！`, 1.3);
                            }, 1300);
                        }
                    }
                } else {
                    if (distanceMeters <= 643 && distanceMeters > 165 && !activeStep.announced04mi) {
                        speak(`${info.roadName}、${info.action}。${info.roadName}、${info.action}。${info.roadName}、${info.action}。`, 1.2);
                        activeStep.announced04mi = true;
                    }
                    else if (distanceMeters <= 161 && distanceMeters > 15) {
                        if (!speechLoopInterval) {
                            speechLoopInterval = setInterval(() => {
                                speak(`${info.action}！ ${info.action}！`, 1.4);
                            }, 800);
                        }
                    }
                }

                if (distanceMeters < 25) {
                    stopAudioLoop();
                    currentRouteSteps.shift();
                }

            }, error => { console.log("GPS Error: ", error); }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        }

        function stopAudioLoop() {
            if (speechLoopInterval) { clearInterval(speechLoopInterval); speechLoopInterval = null; }
        }

        function stopNavigation() {
            playBeep('stop');
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            if (carMarker) { carMarker.setMap(null); carMarker = null; }
            stopAudioLoop();
            synth.cancel();
            currentRouteSteps = [];
            
            document.getElementById('action-title').innerText = "---";
            document.getElementById('action-detail').innerText = "経路未設定";
            document.getElementById('hud-huge-text').innerText = "---";
            document.getElementById('hud-sub-text').innerText = "経路未設定";
            document.getElementById('distance').innerText = "-- mi";
            document.getElementById('speed-limit').innerText = "-- mph";
            document.getElementById('eta').innerText = "--:-- --";
        }
    </script>
</body>
</html>
